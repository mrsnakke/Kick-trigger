<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vista de Personaje</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/view.css">
    <!-- Tailwind CSS CDN para facilitar la adaptación de estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="character-card-container" class="fixed inset-0 flex items-center justify-center z-50 [perspective:1000px] hidden">
        <!-- Overlay - fade in/out separately -->
        <div id="overlay" class="absolute inset-0 transition-opacity duration-300 opacity-0"></div>

        <!-- Card Container for sizing -->
        <div class="relative w-[380px] h-[620px]">
            <div id="card-flipper" class="card-flipper">
                
                <!-- Card Back -->
                <div class="card-face card-back bg-gray-800">
                    <img src="https://github.com/mrsnakke/gachaIMG/blob/main/back.png?raw=true" alt="Card Back" class="w-full h-full object-cover" />
                </div>

                <!-- Card Front -->
                <div class="card-face">
                    <!-- Liquid Glass Background & Glow -->
                    <div class="absolute inset-0 bg-slate-800/20 backdrop-blur-2xl border-2 border-purple-500/30 shadow-2xl shadow-purple-500/40"></div>
                    
                    <!-- Character Image -->
                    <img
                        id="character-image"
                        src=""
                        alt="Imagen del personaje"
                        class="absolute inset-0 w-full h-full object-cover"
                    />

                    <!-- Content Gradient Overlay -->
                    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/50 to-transparent"></div>
                    
                    <div class="relative z-10 flex flex-col justify-end h-full p-6 text-white">
                        <div class="flex-grow"></div>
                        
                        <!-- Name -->
                        <h2 id="character-name" class="text-5xl font-extrabold tracking-wider" style="text-shadow: 0 2px 10px rgba(76, 29, 149, 0.9);">
                            <!-- Character Name Here -->
                        </h2>

                        <!-- Stars -->
                        <div id="character-stars" class="flex items-center my-2">
                            <!-- Star Icons Here -->
                        </div>

                        <!-- "Do you have it?" message -->
                        <div id="user-owns-character-status" class="my-3 px-4 py-2 bg-black/40 rounded-lg border text-center">
                            <span id="user-owns-character-text" class="text-lg font-semibold">
                                <!-- Ownership Status Here -->
                            </span>
                        </div>

                        <!-- Stats & Owners Container -->
                        <div class="mt-4 space-y-4">
                            <!-- Inventory Stat -->
                            <div class="flex items-center space-x-3">
                                <svg id="inventory-icon" class="w-7 h-7 text-green-400 drop-shadow-[0_0_5px_rgba(74,222,128,0.7)]" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M5 3a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2H5zM5 11a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2H5zM11 3a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2h-2zM11 11a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2h-2z"></path>
                                </svg>
                                <div class="text-left">
                                    <span class="text-sm font-light text-gray-300">Total en Inventarios</span>
                                    <p id="total-in-inventories" class="text-xl font-semibold"></p>
                                </div>
                            </div>

                            <!-- Owners List Box -->
                            <div class="p-3 bg-black/40 backdrop-blur-sm rounded-lg border border-white/10 h-[110px] flex flex-col">
                                <div class="flex items-center space-x-2 mb-2 flex-shrink-0">
                                    <svg id="owners-icon" class="w-5 h-5 text-blue-400" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                                        <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path>
                                    </svg>
                                    <h4 class="text-md font-semibold text-gray-300">Propietarios</h4>
                                </div>
                                <ul id="character-owners" class="flex-grow animate-fade-in-out flex flex-row flex-wrap content-start custom-scrollbar">
                                    <!-- Owner Names Here -->
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/view.js"></script>
</body>
</html>
